---
layout: default
---


<content>
  <article class="">
    <div class="title">
      <h1>{{ page.title }}</h1>
      <div class="header-information">
        <div class="project-tags" aria-label="Tags: {{ page.tags | join: ', ' }}">
          {% for tag in page.tags %}
            <span class="tag active" data-filter="{{ tag | downcase }}">{{ tag | capitalize }}</span>
            {% unless forloop.last %}<span class="tag-sep" aria-hidden="true">•</span>{% endunless %}
          {% endfor %}
        </div>
        <time datetime="{{ page.date | date_to_xmlschema }}">{{ page.date | date: "%Y" }}</time>
      </div>
    </div>
    {{ content }}
    <br>
    <p>To learn more about this project, please <a href="/info#contact" class="internal link emoji-hover" data-emoji="📞">reach out</a>.</p>
    <hr>
  </article>
</content>
