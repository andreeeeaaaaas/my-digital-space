---
layout: default
---
<content>
  <article class="">
    <div class="title">
      <h1>{{ page.title }}</h1>
      <div class="header-information">
        {% if page.description %}
    
        <!-- <p class="intro">{{ page.description }}</p> -->
        <time datetime="{{ page.last_modified_at | date_to_xmlschema }}">
          {% if page.type != 'pages' %} {{ page.date | date: "%Y" }} {% endif %}
        </time>
        {% endif %}
        <!-- <div class="project-tags" aria-label="Tags: {{ page.tags | join: ', ' }}">
          {% for tag in page.tags %}
          <div class="tag active" data-filter="{{ tag }}">
            <span class="tag-square"></span>{{ tag | capitalize }}
          </div>
          {% endfor %}
        </div> -->
      </div>
    </div>
    {{ content }} 
    {% if page.title != "Error 404" and page.title != "Info" %} 
    <p>To learn more, please <a href="/contact" class="internal link emoji-hover" data-emoji="📞">reach out</a>.</p>
    {% endif %}
    <hr />
  </article>
</content>
