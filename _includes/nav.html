<div class="nav-left">
  {% if page.id == 'home' %}
    <a href="/" aria-label="Andreas Thoma - Home">Andreas Thoma</a>
  {% else %}
    <button class="circle-btn nav-back-btn" onclick="handleNavBack(event)" aria-label="Go back">
      <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 14 14" fill="none">
        <path d="M3.52342 8.06639L7.99341 12.5364L6.81508 13.7147L0.333422 7.23306L6.81508 0.7514L7.99341 1.9297L3.52342 6.39972H13.6667V8.06639H3.52342Z" fill="currentColor"/>
      </svg>
    </button>
  {% endif %}
</div>

<script>
  var NAV_SCROLL_RESET_KEY = "nav:reset-scroll-on-back";
  var shouldResetScroll = sessionStorage.getItem(NAV_SCROLL_RESET_KEY) === "1";

  function resetScrollToTop() {
    window.scrollTo(0, 0);
    document.documentElement.scrollTop = 0;
    document.body.scrollTop = 0;
  }

  if (shouldResetScroll) {
    sessionStorage.removeItem(NAV_SCROLL_RESET_KEY);

    // Browsers may restore scroll after scripts run (especially with bfcache),
    // so force the reset on multiple lifecycle points.
    if ("scrollRestoration" in window.history) {
      window.history.scrollRestoration = "manual";
    }

    resetScrollToTop();
    requestAnimationFrame(resetScrollToTop);
    setTimeout(resetScrollToTop, 0);

    window.addEventListener("pageshow", resetScrollToTop, { once: true });
    window.addEventListener("load", resetScrollToTop, { once: true });
  }

  function handleNavBack(event) {
    if (event) {
      event.preventDefault();
    }

    var hasSameOriginReferrer = false;

    if (document.referrer) {
      try {
        hasSameOriginReferrer = new URL(document.referrer).origin === window.location.origin;
      } catch (error) {
        hasSameOriginReferrer = false;
      }
    }

    if (hasSameOriginReferrer && window.history.length > 1) {
      sessionStorage.setItem(NAV_SCROLL_RESET_KEY, "1");
      if ("scrollRestoration" in window.history) {
        window.history.scrollRestoration = "manual";
      }
      window.history.back();
      return;
    }

    window.location.assign("/");
  }
</script>
<div class="nav-right">
  {% if page.id == 'home' %}
  <button class="emoji-hover" data-emoji="🎶" id="sound-toggle" aria-label="Toggle sound" aria-pressed="false">
    <svg
      xmlns="http://www.w3.org/2000/svg"
      width="24"
      height="24"
      viewBox="0 0 24 24"
      fill="none"
    >
      <!-- Speaker cone (always visible) -->
      <path
        class="speaker-cone"
        d="M11 5L6 9H2V15H6L11 19V5Z"
        stroke-width="1.5"
        stroke-linecap="round"
        stroke-linejoin="round"
      />
      <!-- Sound waves (hidden when muted) -->
      <path
        class="sound-waves"
        d="M19.07 4.93018C20.9447 6.80545 21.9979 9.34853 21.9979 12.0002C21.9979 14.6518 20.9447 17.1949 19.07 19.0702M15.54 8.46018C16.4774 9.39781 17.004 10.6694 17.004 11.9952C17.004 13.321 16.4774 14.5925 15.54 15.5302"
        stroke-width="1.5"
        stroke-linecap="round"
        stroke-linejoin="round"
      />
      <!-- Mute X (visible when muted) -->
      <path
        class="mute-x"
        d="M23 9L17 15M17 9L23 15"
        stroke-width="1.5"
        stroke-linecap="round"
        stroke-linejoin="round"
      />
    </svg>
  </button>
  
  {% endif %}
  <a href="/info" aria-label="View information about Andreas Thome">Info</a>

  <!-- {% if page.id != 'info' %} -->
    <!-- <a href="/info" aria-label="View information about Andreas Thome">Info</a> -->
  <!-- {% endif %} -->
</div>
